<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sample Reception — Neotrient</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* Neotrient color theme */
  --bg:#F4F6FB;
  --surface:#ffffff;
  --surface2:#F7F9FC;
  --border:#E3E8F2;
  --border-strong:#CBD4E8;
  --text:#1A2235;
  --text2:#4D5870;
  --text3:#8A94AC;

  --primary:#7C9EDC;       /* Neotrient soft blue */
  --primary-d:#5B7FC0;
  --primary-dd:#3F5FA0;
  --primary-l:#E8EEFA;
  --primary-ll:#F3F6FD;

  --accent:#8EBC5E;        /* Neotrient leaf green */
  --accent-d:#6E9B3E;
  --accent-l:#EFF8E3;

  --warn:#E09B3C;
  --warn-l:#FDF3DC;
  --danger:#DC6060;
  --danger-l:#FCE7E7;
  --success:#6BAD6B;
  --success-l:#E6F2E6;
  --info:#6B8DD6;
  --info-l:#E9EFFB;

  --r:12px; --r-sm:8px; --r-lg:16px;
  --shadow-sm:0 1px 3px rgba(30,55,100,0.06);
  --shadow:0 4px 12px rgba(30,55,100,0.08);
  --shadow-lg:0 10px 30px rgba(30,55,100,0.10);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.55;}

/* ══════════ HEADER ══════════ */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:var(--shadow-sm);}
.hdr-left{display:flex;align-items:center;gap:20px;}
.hdr-logos{display:flex;align-items:center;gap:18px;}
.hdr-logos img{height:38px;object-fit:contain;}
.hdr-divider{width:1px;height:30px;background:var(--border);}
.hdr-right{display:flex;align-items:center;gap:12px;}
.chip{font-size:13px;padding:6px 14px;border-radius:24px;display:none;font-weight:500;}
.chip-op{color:var(--text2);background:var(--surface2);border:1px solid var(--border);}
.chip-ses{color:var(--primary-d);background:var(--primary-l);font-family:monospace;}

/* ══════════ PHASE BAR ══════════ */
#phase-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 28px;display:none;}
.phases{display:flex;max-width:900px;margin:0 auto;}
.ph{flex:1;text-align:center;font-size:14px;font-weight:600;
  padding:14px 8px;color:var(--text3);border-bottom:3px solid transparent;
  letter-spacing:0.2px;transition:all 0.2s;}
.ph.active{color:var(--primary-d);border-bottom-color:var(--primary);}
.ph.done{color:var(--accent-d);border-bottom-color:var(--accent);}

/* ══════════ MAIN LAYOUT — 50/50 ══════════ */
#layout{display:flex;min-height:calc(100vh - 64px);gap:0;}
#sidebar{flex:1;max-width:50%;padding:28px;border-right:1px solid var(--border);
  background:var(--surface);display:none;overflow-y:auto;}
#main{flex:1;max-width:50%;padding:28px;background:var(--bg);overflow-y:auto;}
#main.full{max-width:100%;flex:1;}
@media (max-width:1000px){
  #layout{flex-direction:column;}
  #sidebar{max-width:100%;border-right:none;border-bottom:1px solid var(--border);}
  #main{max-width:100%;}
}

/* ══════════ SIDEBAR CONTENT ══════════ */
.sb-card{background:var(--surface);border-radius:var(--r-lg);padding:28px;
  border:1px solid var(--border);box-shadow:var(--shadow);}
.sb-icon{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;
  justify-content:center;font-size:32px;margin-bottom:18px;}
.sb-icon.pri{background:var(--primary-l);color:var(--primary-d);}
.sb-icon.acc{background:var(--accent-l);color:var(--accent-d);}
.sb-icon.warn{background:var(--warn-l);color:var(--warn);}
.sb-icon.info{background:var(--info-l);color:var(--info);}

.sb-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--primary-d);margin-bottom:8px;}
.sb-title{font-size:24px;font-weight:800;margin-bottom:10px;line-height:1.25;letter-spacing:-0.5px;}
.sb-desc{font-size:16px;color:var(--text2);line-height:1.65;margin-bottom:20px;}

.sb-rules{background:var(--primary-ll);border-radius:var(--r);padding:18px 20px;
  border-left:4px solid var(--primary);}
.sb-rules-head{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  color:var(--primary-d);margin-bottom:12px;}
.sb-rule{display:flex;gap:11px;font-size:14px;color:var(--text2);align-items:flex-start;
  margin-bottom:9px;line-height:1.55;}
.sb-rule:last-child{margin-bottom:0;}
.sb-rule-n{width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;}

/* Progress tracker on sidebar */
.progress-tracker{background:var(--surface2);border-radius:var(--r);padding:14px 18px;
  margin-top:20px;border:1px solid var(--border);}
.pt-head{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  color:var(--text3);margin-bottom:10px;}
.pt-bar{display:flex;gap:6px;margin-bottom:10px;}
.pt-dot{flex:1;height:6px;border-radius:3px;background:var(--border);}
.pt-dot.done{background:var(--accent);}
.pt-dot.active{background:var(--primary);}
.pt-stats{font-size:13px;color:var(--text2);display:flex;justify-content:space-between;}

/* ══════════ MAIN CONTENT CARDS ══════════ */
.card{background:var(--surface);border-radius:var(--r-lg);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  padding:22px;margin-bottom:16px;}
.card-head{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.card-title{font-size:17px;font-weight:700;}
.card-sub{font-size:13px;color:var(--text3);}

/* ══════════ BACK BUTTON ══════════ */
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:15px;
  font-weight:500;color:var(--text2);background:var(--surface);
  border:1px solid var(--border);padding:10px 18px;border-radius:10px;
  cursor:pointer;margin-bottom:18px;transition:all 0.15s;}
.back-btn:hover{background:var(--primary-l);color:var(--primary-d);border-color:var(--primary);}
.back-btn:active{transform:scale(0.97);}

/* ══════════ STATUS CARDS ══════════ */
.status{border-radius:var(--r);padding:16px 18px;margin-bottom:14px;border:1px solid transparent;}
.status.ok{background:var(--success-l);border-color:#bedbbe;color:#2a5c2a;}
.status.warn{background:var(--warn-l);border-color:#f3d99b;color:#6d4a12;}
.status.err{background:var(--danger-l);border-color:#f2b8b8;color:#7d2c2c;}
.status.info{background:var(--info-l);border-color:#c2d1f0;color:#2b4380;}
.status.neutral{background:var(--surface2);border-color:var(--border);color:var(--text);}
.status-h{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.status-b{font-size:14px;line-height:1.55;}

/* ══════════ CAMERA — SQUARE ══════════ */
.cam-wrap{position:relative;width:100%;aspect-ratio:1/1;background:#0F1419;
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;
  max-width:440px;margin-left:auto;margin-right:auto;
  box-shadow:var(--shadow);}
.cam-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
.cam-corners::before,.cam-corners::after,.cam-corners-b::before,.cam-corners-b::after{
  content:'';position:absolute;width:36px;height:36px;border:4px solid var(--primary);
  box-shadow:0 0 12px rgba(124,158,220,0.4);}
.cam-corners::before{top:18px;left:18px;border-right:none;border-bottom:none;border-radius:6px 0 0 0;}
.cam-corners::after{top:18px;right:18px;border-left:none;border-bottom:none;border-radius:0 6px 0 0;}
.cam-corners-b::before{bottom:18px;left:18px;border-right:none;border-top:none;border-radius:0 0 0 6px;}
.cam-corners-b::after{bottom:18px;right:18px;border-left:none;border-top:none;border-radius:0 0 6px 0;}
#cam-flash{position:absolute;inset:0;background:rgba(124,158,220,0.45);
  opacity:0;transition:opacity 0.1s;pointer-events:none;}
#cam-flash.on{opacity:1;}
.cam-pill{position:absolute;top:12px;left:12px;right:12px;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);border-radius:8px;padding:8px 14px;
  display:flex;align-items:center;gap:10px;}
.cam-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);
  animation:pulse 1.3s infinite;box-shadow:0 0 8px var(--accent);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.85);}}
.cam-txt{font-size:13px;color:rgba(255,255,255,0.95);font-family:monospace;font-weight:500;}

/* ══════════ SCAN LIST ══════════ */
.scan-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.scan-item{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:12px;
  transition:all 0.15s;}
.scan-item.ok{border-left:4px solid var(--accent);}
.scan-item.pending{border-left:4px solid var(--warn);opacity:0.6;}
.scan-item.active{border-left:4px solid var(--primary);background:var(--primary-l);}
.si-id{font-size:15px;font-weight:600;font-family:monospace;}
.si-meta{font-size:13px;color:var(--text3);margin-top:2px;}
.si-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-left:auto;
  letter-spacing:0.5px;}
.bg-ok{background:var(--accent-l);color:var(--accent-d);}
.bg-pend{background:var(--warn-l);color:var(--warn);}

/* ══════════ POUCH CARD ══════════ */
.pouch-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
.pouch-head{padding:14px 18px;background:var(--primary-l);border-bottom:1px solid #C5D1ED;
  display:flex;align-items:center;justify-content:space-between;}
.pouch-title{font-size:15px;font-weight:700;color:var(--primary-dd);}
.pouch-body{padding:14px 18px;}
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip-item{font-size:13px;font-family:monospace;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;padding:5px 11px;color:var(--text2);}
.chip-item.ok{background:var(--accent-l);border-color:#bedbbe;color:var(--accent-d);}

/* ══════════ FORMS ══════════ */
.form-sec{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:14px;overflow:hidden;}
.form-sec-hd{padding:14px 18px;display:flex;align-items:center;gap:11px;
  border-bottom:1px solid var(--border);background:var(--surface2);}
.sec-letter{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.sec-name{font-size:15px;font-weight:700;}
.form-fields{padding:18px;display:flex;flex-direction:column;gap:14px;}
.frow{display:flex;gap:14px;flex-wrap:wrap;}
.fg{flex:1;min-width:160px;display:flex;flex-direction:column;gap:6px;}
.fg.full{flex:0 0 100%;}
.flabel{font-size:13px;font-weight:600;color:var(--text2);}
.finput{border:1px solid var(--border-strong);border-radius:var(--r-sm);
  padding:10px 13px;font-size:15px;font-family:inherit;background:var(--surface);
  color:var(--text);width:100%;transition:all 0.15s;}
.finput:focus{outline:none;border-color:var(--primary);
  box-shadow:0 0 0 3px var(--primary-l);}
.finput.ai-ok{background:var(--accent-l);border-color:#b0cc89;}
.finput.ai-warn{background:var(--warn-l);border-color:#dbb878;}
textarea.finput{resize:vertical;min-height:72px;}
.radios{display:flex;gap:8px;flex-wrap:wrap;}
.rbtn{display:flex;align-items:center;gap:6px;padding:9px 15px;
  border:1px solid var(--border-strong);border-radius:9px;cursor:pointer;
  font-size:14px;font-weight:500;background:var(--surface);transition:all 0.15s;}
.rbtn:hover{border-color:var(--primary);background:var(--primary-l);}
.rbtn.sel{background:var(--primary);border-color:var(--primary-d);color:#fff;font-weight:600;}

/* ══════════ SIGNATURE PAD ══════════ */
.sig-area{display:flex;gap:16px;flex-wrap:wrap;}
.sig-box{flex:1;min-width:240px;}
.sig-box-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.sig-canvas-wrap{border:1px solid var(--border-strong);border-radius:var(--r-sm);
  background:#fafbfd;position:relative;overflow:hidden;}
.sig-canvas{display:block;width:100%;cursor:crosshair;touch-action:none;}
.sig-tools{display:flex;gap:8px;margin-top:8px;}
.sig-preview{width:100%;max-height:100px;object-fit:contain;border-radius:8px;
  border:1px solid var(--border);display:none;}

/* ══════════ CAPTURE PREVIEW ══════════ */
.capture-img{width:100%;border-radius:var(--r);border:1px solid var(--border);
  margin-bottom:16px;max-height:420px;object-fit:contain;background:#111;
  display:block;box-shadow:var(--shadow);}

/* ══════════ UPLOAD ZONE ══════════ */
.upload-zone{border:2px dashed var(--border-strong);border-radius:var(--r);
  padding:34px;text-align:center;cursor:pointer;transition:all 0.15s;
  background:var(--surface);}
.upload-zone:hover{border-color:var(--primary);background:var(--primary-l);}
.upload-zone input{display:none;}
.upload-icon{font-size:36px;margin-bottom:10px;color:var(--primary);}
.upload-text{font-size:16px;font-weight:600;margin-bottom:4px;}
.upload-sub{font-size:14px;color:var(--text3);}

/* ══════════ BUTTONS — LARGER ══════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;
  padding:14px 28px;border-radius:11px;font-size:16px;font-weight:600;
  cursor:pointer;border:none;transition:all 0.15s;letter-spacing:-0.2px;
  min-height:50px;}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.45;cursor:default;transform:none;}
.btn-p{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(124,158,220,0.3);}
.btn-p:hover:not(:disabled){background:var(--primary-d);box-shadow:0 4px 14px rgba(124,158,220,0.45);}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border-strong);}
.btn-s:hover{background:var(--surface2);border-color:var(--primary);}
.btn-ok{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(142,188,94,0.3);}
.btn-ok:hover{background:var(--accent-d);box-shadow:0 4px 14px rgba(142,188,94,0.45);}
.btn-w{background:var(--warn-l);color:var(--warn);border:1px solid #f3d99b;}
.btn-d{background:var(--danger-l);color:var(--danger);border:1px solid #f2b8b8;}
.btn-big{padding:16px 32px;font-size:17px;min-height:56px;}
.btn-sm{padding:10px 18px;font-size:14px;min-height:40px;}
.brow{display:flex;gap:11px;flex-wrap:wrap;margin-top:8px;}
.brow .btn{flex:1;min-width:140px;}

/* ══════════ LOADER ══════════ */
.loader{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:56px;gap:20px;}
.spinner{width:52px;height:52px;border:4px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-t{font-size:18px;font-weight:700;}
.loader-s{font-size:15px;color:var(--text2);text-align:center;max-width:360px;}

/* ══════════ WELCOME ══════════ */
.welcome-wrap{max-width:560px;margin:0 auto;padding:20px;}
.welcome-hero{text-align:center;padding:20px 0 36px;}
.welcome-logo{height:60px;margin-bottom:20px;}
.welcome-title{font-size:32px;font-weight:800;margin-bottom:8px;
  letter-spacing:-0.8px;color:var(--text);}
.welcome-sub{font-size:17px;color:var(--text2);line-height:1.6;}
.fw-group{margin-bottom:18px;}
.fw-label{font-size:14px;font-weight:600;color:var(--text2);display:block;margin-bottom:7px;}
.fw-note{font-size:13px;color:var(--text3);line-height:1.55;margin-top:6px;}
.fw-note a{color:var(--primary-d);}

/* ══════════ SUMMARY ══════════ */
.sum-table{width:100%;border-collapse:collapse;font-size:15px;}
.sum-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.sum-table td:first-child{color:var(--text2);font-weight:500;width:45%;}
.sum-table td:last-child{font-family:monospace;font-size:14px;}

hr.div{border:none;border-top:1px solid var(--border);margin:18px 0;}
canvas#canvas,video#video{display:none;}

/* KPI cards like dashboard */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;box-shadow:var(--shadow-sm);}
.kpi.primary{background:var(--primary);color:#fff;border:none;}
.kpi.primary .kpi-label{color:rgba(255,255,255,0.85);}
.kpi-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.4px;
  text-transform:uppercase;margin-bottom:6px;}
.kpi-value{font-size:28px;font-weight:800;letter-spacing:-0.8px;}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:3px;}
.kpi.primary .kpi-sub{color:rgba(255,255,255,0.8);}
</style>

<script>
// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
const S = {
  screen:'welcome', operator:'', api_key:'', session_id:'',
  session_start:null,
  n_shipments:1,          // 1-5 shipment boxes per session
  n_donors:2,             // default 1-5 donor pouches per shipment
  shipments:[],           // [{id, scanned_at, pouches:[{id, cryovials:[], ...}]}]
  cur_shipment:0,         // which shipment box we're currently processing
  cur_pouch:0,            // which pouch within that shipment
  q_shipment_idx:0,       // phase 2: which shipment
  q_idx:0,                // phase 2: which pouch within that shipment
  q_image:null, q_image_mime:'image/jpeg', q_extracted:{}, q_forms:[],
  cam_stream:null, cam_mode:null, scan_anim:null,
  scan_cooldown:false, last_scan:'', on_qr:null,
  nav_stack:[],
  extract_method:'gemini',
};

// Compatibility shims — many existing functions use S.shipment / S.pouches
Object.defineProperty(S, 'shipment', {
  get(){ return this.shipments[this.cur_shipment] || null; },
  set(v){ if(this.shipments[this.cur_shipment]) Object.assign(this.shipments[this.cur_shipment], v); else this.shipments[this.cur_shipment] = v; }
});
Object.defineProperty(S, 'pouches', {
  get(){ return (this.shipments[this.cur_shipment] && this.shipments[this.cur_shipment].pouches) || []; },
  set(v){ if(!this.shipments[this.cur_shipment]) this.shipments[this.cur_shipment] = {pouches:[]}; this.shipments[this.cur_shipment].pouches = v; }
});


// Flatten all pouches across all shipments into a single linear list
function all_pouches_flat(){
  const out = [];
  S.shipments.forEach((sh, si) => {
    sh.pouches.forEach((p, pi) => {
      out.push({shipment_idx: si, pouch_idx: pi, pouch: p, shipment: sh});
    });
  });
  return out;
}
function total_pouches(){ return all_pouches_flat().length; }
function pouch_at_q_idx(){
  const all = all_pouches_flat();
  return all[S.q_idx] || null;
}

const ts = () => new Date().toISOString();
const fmt = (iso) => new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const gid = () => 'SES-'+Date.now().toString(36).toUpperCase();
const esc = (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════
function push_nav(fn){ S.nav_stack.push(fn); }
function go_back(){
  stop_cam();
  if(S.nav_stack.length>0){ S.nav_stack.pop()(); }
}
function back_btn(label='Back'){
  return `<button class="back-btn" onclick="go_back()">← ${label}</button>`;
}

// ════════════════════════════════════════════════════════
// RENDER HELPERS
// ════════════════════════════════════════════════════════
function main(html){ document.getElementById('main').innerHTML=html; }
function set_main_full(full){
  const m=document.getElementById('main');
  m.className = full ? 'full' : '';
}
function set_phase(p){
  [1,2,3].forEach(i=>{
    const el=document.getElementById('ph'+i);
    if(!el)return;
    el.className='ph'+(i<p?' done':i===p?' active':'');
  });
  document.getElementById('phase-bar').style.display='block';
}
function sidebar(cfg){
  const sb=document.getElementById('sidebar');
  sb.style.display='block';
  set_main_full(false);
  const rules=(cfg.rules||[]).map((r,i)=>
    `<div class="sb-rule"><div class="sb-rule-n">${i+1}</div><div>${r}</div></div>`).join('');
  const prog = cfg.progress ? `
    <div class="progress-tracker">
      <div class="pt-head">${cfg.progress.label||'Progress'}</div>
      <div class="pt-bar">${Array.from({length:cfg.progress.total},(_,i)=>
        `<div class="pt-dot ${i<cfg.progress.cur?'done':i===cfg.progress.cur?'active':''}"></div>`).join('')}</div>
      <div class="pt-stats"><span>${cfg.progress.current_text||''}</span><span>${cfg.progress.cur}/${cfg.progress.total}</span></div>
    </div>` : '';
  sb.innerHTML=`
    <div class="sb-card">
      <div class="sb-icon ${cfg.color||'pri'}">${cfg.icon||'📋'}</div>
      <div class="sb-label">${cfg.step||''}</div>
      <div class="sb-title">${cfg.title||''}</div>
      <div class="sb-desc">${cfg.desc||''}</div>
      ${rules?`<div class="sb-rules"><div class="sb-rules-head">Checklist</div>${rules}</div>`:''}
      ${prog}
    </div>`;
}
function hide_sidebar(){
  document.getElementById('sidebar').style.display='none';
  set_main_full(true);
}
function update_chips(){
  const oc=document.getElementById('op-chip');
  const sc=document.getElementById('ses-chip');
  if(S.operator){oc.style.display='inline-block';oc.textContent=S.operator;}
  if(S.session_id){sc.style.display='inline-block';sc.textContent=S.session_id;}
}

// ════════════════════════════════════════════════════════
// CAMERA
// ════════════════════════════════════════════════════════
async function start_cam(mode,wrap_id){
  await stop_cam();
  S.cam_mode=mode;
  try{
    S.cam_stream = await navigator.mediaDevices.getUserMedia(
      {video:{width:{ideal:1280},height:{ideal:1280},facingMode:'environment'}});
    const v=document.getElementById('video');
    v.srcObject=S.cam_stream;
    await v.play();
    const wrap=document.getElementById(wrap_id||'cam-wrap');
    if(wrap){
      const lv=document.createElement('video');
      lv.id='cam-live'; lv.autoplay=true; lv.playsInline=true; lv.muted=true;
      lv.srcObject=S.cam_stream;
      lv.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
      wrap.prepend(lv);
      await lv.play();
    }
    if(mode==='scan') scan_loop();
  }catch(e){
    const wrap=document.getElementById(wrap_id||'cam-wrap');
    if(wrap) wrap.innerHTML=`<div style="color:#fff;background:#0F1419;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center;border-radius:var(--r-lg);"><div style="font-size:40px">📷</div><div style="font-size:16px;color:#f87171;font-weight:600">Camera error</div><div style="font-size:13px;color:#cbd5e1">${esc(e.message)}</div><div style="font-size:12px;color:#94a3b8;max-width:280px">Allow camera access in browser settings and reload the page.</div></div>`;
  }
}
async function stop_cam(){
  if(S.scan_anim){cancelAnimationFrame(S.scan_anim);S.scan_anim=null;}
  if(S.cam_stream){S.cam_stream.getTracks().forEach(t=>t.stop());S.cam_stream=null;}
  S.cam_mode=null;
  const lv=document.getElementById('cam-live'); if(lv)lv.remove();
}
function scan_loop(){
  const cv=document.getElementById('canvas'); const ctx=cv.getContext('2d');
  function tick(){
    const lv=document.getElementById('cam-live')||document.getElementById('video');
    if(!S.cam_stream||!lv){S.scan_anim=null;return;}
    if(lv.readyState>=lv.HAVE_ENOUGH_DATA){
      cv.width=lv.videoWidth; cv.height=lv.videoHeight;
      ctx.drawImage(lv,0,0,cv.width,cv.height);
      const img=ctx.getImageData(0,0,cv.width,cv.height);
      const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(code && code.data && code.data !== S.last_scan && !S.scan_cooldown){
        S.last_scan=code.data;
        S.scan_cooldown=true;
        setTimeout(()=>{S.scan_cooldown=false;S.last_scan='';},2500);
        cam_flash();
        if(S.on_qr) S.on_qr(code.data);
      }
    }
    S.scan_anim=requestAnimationFrame(tick);
  }
  S.scan_anim=requestAnimationFrame(tick);
}
function cam_flash(err){
  const f=document.getElementById('cam-flash'); if(!f)return;
  f.style.background = err ? 'rgba(220,96,96,0.4)' : 'rgba(124,158,220,0.45)';
  f.classList.add('on'); setTimeout(()=>f.classList.remove('on'),200);
  if(navigator.vibrate) navigator.vibrate(err?[80,40,80]:50);
}
function snap_photo(){
  const cv=document.getElementById('canvas'); const ctx=cv.getContext('2d');
  const lv=document.getElementById('cam-live')||document.getElementById('video');
  cv.width=lv.videoWidth||1280; cv.height=lv.videoHeight||960;
  ctx.drawImage(lv,0,0,cv.width,cv.height);
  return cv.toDataURL('image/jpeg',0.92);
}
function cam_html(label){
  return `<div class="cam-wrap" id="cam-wrap">
    <div class="cam-corners"></div><div class="cam-corners-b"></div>
    <div id="cam-flash"></div>
    <div class="cam-pill"><div class="cam-dot"></div><span class="cam-txt" id="cam-txt">${label||'Scanning...'}</span></div>
  </div>`;
}
const parse_qr = (raw) => { try{return JSON.parse(raw);}catch{return null;} };

// SCREEN: WELCOME

async function test_key(){
  const key=document.getElementById('api-key').value.trim();
  const method=document.getElementById('extract-method').value;
  if(!key){alert('Please enter an API key first.');return;}
  const btn=event.target;
  btn.textContent='Testing...';
  try{
    if(method==='gemini'){
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(key),{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:'Reply with just: OK'}]}]})
      });
      const d=await r.json();
      if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
      const reply = d.candidates?.[0]?.content?.parts?.[0]?.text || 'empty';
      alert('✓ Gemini API key works!\nResponse: '+reply);
    } else {
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:30,
          messages:[{role:'user',content:'Reply with just: OK'}]})
      });
      const d=await r.json();
      if(d.error) throw new Error(d.error.message);
      alert('✓ API key works!\nResponse: '+(d.content?.[0]?.text||'empty'));
    }
  }catch(e){
    alert('✗ API test failed:\n'+e.message);
  }
  btn.textContent='Test my key';
}
function sel_method(m,el){
  document.getElementById('rg-method').querySelectorAll('.rbtn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('extract-method').value=m;
  const show_key = (m==='anthropic' || m==='gemini');
  document.getElementById('api-key-group').style.display = show_key ? 'block' : 'none';
  const label = document.getElementById('api-key-label');
  const input = document.getElementById('api-key');
  if(label && input){
    if(m==='gemini'){ label.innerHTML = 'Google Gemini API Key <span style="color:var(--danger)">*</span>'; input.placeholder='AIza...'; }
    else if(m==='anthropic'){ label.innerHTML = 'Anthropic API Key <span style="color:var(--danger)">*</span>'; input.placeholder='sk-ant-...'; }
  }
}
function start_session(){
  const op=document.getElementById('op-id').value.trim();
  const ns=parseInt(document.getElementById('n-shipments').value)||1;
  const nd=parseInt(document.getElementById('n-donors').value)||2;
  const method=document.getElementById('extract-method').value;
  const keyEl=document.getElementById('api-key');
  const key=keyEl?keyEl.value.trim():'';
  if(!op){alert('Please enter your operator ID or name.');return;}
  if(ns<1||ns>5){alert('Number of shipment boxes must be 1-5.');return;}
  if(nd<1||nd>5){alert('Max donor pouches must be 1-5.');return;}
  if(method==='anthropic' && !key){
    if(!confirm('No API key entered — cloud AI won\'t work. Start anyway and fall back to manual entry?')) return;
  }
  S.operator=op; S.n_shipments=ns; S.n_donors=nd; S.api_key=key; S.extract_method=method;
  S.session_id=gid(); S.session_start=ts();
  S.shipments=[]; S.cur_shipment=0; S.cur_pouch=0;
  S.q_shipment_idx=0; S.q_idx=0; S.q_forms=[];
  update_chips();
  scr_scan_box();
}

      'If the seal is broken or box is damaged, stop and flag it',
    ],
    progress:{label:'Session progress',total:S.n_shipments,cur:shipIdx,current_text:`Shipment box ${shipIdx+1}`}
  });
  push_nav(scr_welcome);
  main(`
    ${back_btn(S.cur_shipment>0?'Back':'Back to Welcome')}
    <div class="status info" id="box-st">
      <div class="status-h">🔵 Waiting for shipment box ${S.cur_shipment+1} of ${S.n_shipments}</div>
      <div class="status-b">Point the camera at the QR code. Up to <strong>${S.n_donors} donor pouch${S.n_donors>1?'es':''}</strong> may be inside.</div>
    </div>
    ${cam_html(`Ready to scan shipment box ${S.cur_shipment+1}...`)}
    <div class="brow">
      <button class="btn btn-s" onclick="sim_box()">Simulate SH-000${S.cur_shipment+1}</button>
    </div>`);
  S.on_qr=(raw)=>{
    const d=parse_qr(raw);
    if(!d||d.type!=='SHIPMENT_BOX'){
      cam_flash(true);
      document.getElementById('box-st').outerHTML=`<div class="status warn" id="box-st"><div class="status-h">⚠ Wrong QR type</div><div class="status-b">Expected SHIPMENT_BOX. Got: ${esc(d?.type||raw.slice(0,40))}. Try again.</div></div>`;
      return;
    }
    // ── Build pouches list — OPERATOR-ENTERED n_donors is ALWAYS the source of truth ──
    // User said N donors → we process exactly N pouches, no more no less.
    const qr_contains = d.contains || [];
    let pouches_list = [];
    let warning = '';

    if(qr_contains.length === S.n_donors){
      pouches_list = [...qr_contains];
    } else if(qr_contains.length > S.n_donors){
      // QR lists MORE than user said → TRIM to n_donors (first N)
      pouches_list = qr_contains.slice(0, S.n_donors);
      const dropped = qr_contains.slice(S.n_donors).join(', ');
      warning = `<br><strong>⚠ Count mismatch:</strong> QR lists ${qr_contains.length} pouches but you said only <strong>${S.n_donors}</strong>. Processing first ${S.n_donors}: ${pouches_list.join(', ')}. Ignoring: ${dropped}.`;
    } else if(qr_contains.length < S.n_donors){
      // QR lists FEWER → pad with placeholders up to n_donors
      pouches_list = [...qr_contains];
      for(let i=qr_contains.length; i<S.n_donors; i++){
        pouches_list.push(`DP-PLACEHOLDER-${i+1}`);
      }
      warning = `<br><strong>⚠ Count mismatch:</strong> QR lists only ${qr_contains.length} pouch(es), you expected ${S.n_donors}. Added ${S.n_donors-qr_contains.length} placeholder slot(s).`;
    } else {
      // QR empty — build n placeholders
      for(let i=0; i<S.n_donors; i++){
        pouches_list.push(`DP-PLACEHOLDER-${i+1}`);
      }
      warning = `<br>QR did not list pouches. Created ${S.n_donors} slot(s) — scan pouches in any order.`;
    }

    // Initialize this shipment slot if needed, then write
    if(!S.shipments[S.cur_shipment]) S.shipments[S.cur_shipment] = {};
    S.shipments[S.cur_shipment] = {...S.shipments[S.cur_shipment], ...d, scanned_at:ts(), n_donors_expected:S.n_donors};
    S.shipments[S.cur_shipment].pouches = pouches_list.map(id=>({id, is_placeholder:id.startsWith('DP-PLACEHOLDER'),
      donor_ref:'', contains:[], cryovials:[], scanned_at:null}));
    S.cur_pouch = 0;

    document.getElementById('box-st').outerHTML=`<div class="status ok" id="box-st"><div class="status-h">✓ Shipment confirmed: ${esc(d.id)}</div><div class="status-b">Will verify <strong>${S.pouches.length}</strong> pouch(es) · Lab: ${d.lab||'—'} · Date: ${d.date||'—'}${warning}</div></div>`;
    setTimeout(()=>{stop_cam();scr_scan_pouch();},1600);
  };
  setTimeout(()=>start_cam('scan','cam-wrap'),100);
}
function sim_box(){
  if(!S.on_qr) return;
  const sn = String(S.cur_shipment+1).padStart(4,'0');
  const contains = [];
  for(let i=1; i<=S.n_donors; i++){
    const base = (S.cur_shipment*5) + i;
    contains.push(`DP-${String(base).padStart(4,'0')}`);
  }
  S.on_qr(`{"id":"SH-${sn}","type":"SHIPMENT_BOX","contains":${JSON.stringify(contains)},"date":"2026-04-21","lab":"SZLab"}`);
}

// SCREEN: SCAN POUCH
// ════════════════════════════════════════════════════════
function scr_scan_pouch(){
  S.screen='scan_pouch';
  const idx=S.cur_pouch, total=S.pouches.length;
  const p=S.pouches[idx];
  const exp=p?.id||''; const is_ph=p?.is_placeholder;
  sidebar({
    icon:'🧪', color:'pri', step:`Phase 1 · Shipment ${S.cur_shipment+1} of ${S.n_shipments} · Pouch ${idx+1} of ${total}`,
    title:is_ph?`Scan Pouch Slot ${idx+1}`:`Scan Donor Pouch ${idx+1}`,
    desc:is_ph?`This slot has no pre-assigned ID. Scan <strong>any</strong> donor pouch from this shipment box — its ID will be recorded.`
         :`Locate the pouch labelled <strong>${exp}</strong> in shipment <strong>${S.shipment?.id||''}</strong>. Scan its QR code.`,
    rules:is_ph?[
      'Pouch ID not pre-registered — will be captured on scan',
      'Any DONOR_POUCH type QR is accepted',
      'Do not open the pouch yet',
      'If this pouch doesn\'t exist, tap "No more pouches" below',
    ]:[
      `Expected pouch ID: <strong>${exp}</strong>`,
      'The pouch must be sealed and undamaged',
      'If pouch is missing from shipment, tap "No more pouches"',
    ],
    progress:{label:`Shipment ${S.cur_shipment+1} pouches`,total:total,cur:idx,current_text:`Pouch ${idx+1}`}
  });
  push_nav(idx>0?scr_scan_pouch_prev:scr_scan_box);
  main(`
    ${back_btn()}
    <div class="status info" id="pouch-st">
      <div class="status-h">🔵 Waiting for pouch QR — ${idx+1} of ${total}</div>
      <div class="status-b">${is_ph?'Scan any donor pouch from the box':`Expected: <strong>${exp}</strong>`}. Point camera at the QR label.</div>
    </div>
    ${cam_html(`Scanning pouch ${idx+1} of ${total}...`)}
    <div class="brow">
      <button class="btn btn-s" onclick="sim_pouch(${idx})">Simulate ${is_ph?'random pouch':exp}</button>
      <button class="btn btn-w" onclick="finish_pouches_early()">No more pouches in this shipment</button>
    </div>`);
  S.on_qr=(raw)=>{
    const d=parse_qr(raw);
    if(!d||d.type!=='DONOR_POUCH'){
      cam_flash(true);
      document.getElementById('pouch-st').outerHTML=`<div class="status warn" id="pouch-st"><div class="status-h">⚠ Wrong QR type</div><div class="status-b">Expected DONOR_POUCH. Got: ${esc(d?.type||raw.slice(0,40))}.</div></div>`;
      return;
    }
    // Check duplicate pouches already scanned
    const already = S.pouches.find((x,i) => i!==idx && x.id===d.id && !x.is_placeholder);
    if(already){
      cam_flash(true);
      document.getElementById('pouch-st').outerHTML=`<div class="status warn" id="pouch-st"><div class="status-h">⚠ Duplicate pouch</div><div class="status-b">Pouch <strong>${esc(d.id)}</strong> was already scanned in slot ${S.pouches.indexOf(already)+1}.</div></div>`;
      return;
    }
    // For a pre-registered pouch, check ID match; for placeholder, accept any
    if(!is_ph && d.id!==exp){
      cam_flash(true);
      document.getElementById('pouch-st').outerHTML=`<div class="status warn" id="pouch-st"><div class="status-h">⚠ Wrong pouch — got ${esc(d.id)}</div><div class="status-b">Expected <strong>${exp}</strong>. Check you have the correct pouch for this slot, or swap to the correct slot order.</div></div>`;
      return;
    }
    S.pouches[idx] = {...S.pouches[idx], ...d, is_placeholder:false, scanned_at:ts(), cryovials:[]};
    document.getElementById('pouch-st').outerHTML=`<div class="status ok" id="pouch-st"><div class="status-h">✓ Pouch confirmed: ${esc(d.id)}</div><div class="status-b">Donor ref: ${d.donor_ref||'—'} · Contains: ${(d.contains||[]).join(', ')||'(no vial list)'}</div></div>`;
    setTimeout(()=>{stop_cam();scr_scan_vials();},1200);
  };
  setTimeout(()=>start_cam('scan','cam-wrap'),100);
}
function scr_scan_pouch_prev(){ S.cur_pouch=Math.max(0,S.cur_pouch-1); scr_scan_pouch(); }
function sim_pouch(i){
  const p=S.pouches[i];
  const id = p.is_placeholder ? `DP-000${i+1}` : p.id;
  const n=id.replace(/DP-/,'').padStart(4,'0').slice(-4);
  if(S.on_qr)S.on_qr(`{"id":"${id}","type":"DONOR_POUCH","shipment":"SH-0001","donor_ref":"D${n}","contains":["CV-${n}-01","CV-${n}-02","CV-${n}-03"]}`);
}

// SCREEN: SCAN CRYOVIALS
// ════════════════════════════════════════════════════════
function scr_scan_vials(){
  S.screen='scan_vials';
  const p=S.pouches[S.cur_pouch];
  const MAX_VIALS = 3;
  const got=p.cryovials||[];
  const at_max = got.length >= MAX_VIALS;

  sidebar({
    icon:'🧊', color:'pri', step:`Phase 1 · ${p.id} — Cryovials`,
    title:`Scan Cryovials (${got.length}/${MAX_VIALS} max)`,
    desc:at_max
      ? `Maximum <strong>${MAX_VIALS}</strong> cryovials reached for <strong>${p.id}</strong>. Tap Done to continue.`
      : `Scan each cryovial QR from pouch <strong>${p.id}</strong>. You have scanned <strong>${got.length}</strong> so far (max ${MAX_VIALS}). Tap <strong>Done</strong> when all cryovials are scanned — a pouch may contain 1, 2, or 3 vials.`,
    rules:at_max?[
      'Maximum 3 cryovials reached',
      'Tap Done &amp; Continue to proceed',
    ]:[
      `Maximum <strong>${MAX_VIALS}</strong> cryovials per pouch`,
      'Scan each tube one at a time',
      'Duplicate scans are ignored',
      'Tap <strong>Done</strong> if the pouch has fewer than 3',
    ],
    progress:{label:`Shipment ${S.cur_shipment+1} pouches`,total:S.pouches.length,cur:S.cur_pouch,current_text:`Pouch ${S.cur_pouch+1} vials`}
  });
  push_nav(scr_scan_pouch);

  // Show what's been scanned + empty slots
  const slots = [];
  for(let i=0;i<MAX_VIALS;i++){
    const s = got[i];
    slots.push(`<div class="scan-item ${s?'ok':'pending'}">
      <span style="font-size:20px">${s?'✅':'⬜'}</span>
      <div style="flex:1;min-width:0">
        <div class="si-id">${s?s.id:`Slot ${i+1} (empty)`}</div>
        <div class="si-meta">${s?'Scanned '+fmt(s.scanned_at):'Awaiting scan or skip'}</div>
      </div>
      <span class="si-badge ${s?'bg-ok':'bg-pend'}">${s?'OK':'EMPTY'}</span>
    </div>`);
  }

  main(`
    ${back_btn()}
    ${at_max
      ? `<div class="status ok" style="margin-bottom:14px"><div class="status-h">✓ Maximum ${MAX_VIALS} cryovials scanned for ${esc(p.id)}</div></div>`
      : `<div class="status info" style="margin-bottom:14px"><div class="status-h">🔵 ${got.length} / ${MAX_VIALS} scanned</div><div class="status-b">Scan remaining cryovials, or tap <strong>Done</strong> if this pouch has fewer than 3.</div></div>`}
    ${at_max?'':cam_html(`Scanned ${got.length} / ${MAX_VIALS}...`)}
    <div class="scan-list">${slots.join('')}</div>
    <div class="brow">
      ${at_max
        ? `<button class="btn btn-ok btn-big" onclick="confirm_pouch()">✓ Done &amp; Continue</button>`
        : `<button class="btn btn-s" onclick="sim_vial()">Simulate scan</button>
           <button class="btn btn-ok btn-big" onclick="confirm_pouch()">✓ Done (${got.length} vial${got.length!==1?'s':''})</button>`
      }
    </div>`);

  if(!at_max){
    S.on_qr=(raw)=>{
      const d=parse_qr(raw);
      if(!d||d.type!=='CRYOVIAL'){cam_flash(true);return;}
      if(d.pouch && d.pouch!==p.id){
        cam_flash(true);
        const t=document.getElementById('cam-txt');
        if(t){t.textContent=`Wrong pouch: ${d.pouch}`;setTimeout(()=>t.textContent='Scanning...',2000);}
        return;
      }
      if(p.cryovials.find(g=>g.id===d.id)){
        const t=document.getElementById('cam-txt');
        if(t){t.textContent='Already scanned';setTimeout(()=>t.textContent='Scanning...',1500);}
        return;
      }
      p.cryovials.push({...d,scanned_at:ts()});
      scr_scan_vials();
    };
    setTimeout(()=>start_cam('scan','cam-wrap'),100);
  } else { stop_cam(); S.on_qr=null; }
}
function sim_vial(){
  const p=S.pouches[S.cur_pouch];
  const exp=p.contains||[];
  const rem=exp.filter(e=>!p.cryovials.find(g=>g.id===e));
  let eid;
  if(rem.length) eid=rem[0];
  else eid=`CV-NEW-${String(p.cryovials.length+1).padStart(2,'0')}`;
  const pn=p.id.replace('DP-','');
  if(S.on_qr)S.on_qr(`{"id":"${eid}","type":"CRYOVIAL","pouch":"${p.id}","shipment":"SH-0001","vol_ml":2}`);
}
function confirm_pouch(){
  stop_cam();
  const p=S.pouches[S.cur_pouch];
  // No longer prompt about "missing" — cryovials are 0-3, any count is valid.
  // We just record whatever was scanned.
  S.cur_pouch++;
  if(S.cur_pouch<S.pouches.length) scr_scan_pouch();
  else advance_shipment_or_finish();
}

// User clicked "No more pouches" — truncate current shipment's pouch list
// to only those actually scanned so far, mark remaining as unused.
function finish_pouches_early(){
  stop_cam();
  const ship = S.shipments[S.cur_shipment];
  if(!ship) return;
  // Mark unused placeholder pouches as "not_present"
  const usedCount = ship.pouches.filter(p => p.scanned_at).length;
  if(usedCount < ship.pouches.length){
    if(!confirm(`Finish shipment ${ship.id||S.cur_shipment+1}?\n\nScanned ${usedCount} pouch(es). The remaining ${ship.pouches.length-usedCount} placeholder slot(s) will be marked as "not present in shipment".`)) return;
    // Trim list to actually scanned ones
    ship.pouches = ship.pouches.filter(p => p.scanned_at);
  }
  advance_shipment_or_finish();
}

// After finishing a shipment's pouches, move to next shipment or phase-done
function advance_shipment_or_finish(){
  S.cur_shipment++;
  if(S.cur_shipment < S.n_shipments){
    S.cur_pouch = 0;
    // Between-shipment handoff screen
    scr_between_shipments();
  } else {
    scr_physical_done();
  }
}

// Optional friendly handoff between shipments
function scr_between_shipments(){
  hide_sidebar();
  const done_count = S.cur_shipment;
  const next_n = S.cur_shipment + 1;
  const remaining = S.n_shipments - done_count;
  push_nav(()=>{ S.cur_shipment--; if(S.shipments[S.cur_shipment]) S.cur_pouch=S.shipments[S.cur_shipment].pouches.length-1; scr_scan_pouch(); });
  main(`<div style="max-width:560px;margin:40px auto">
    ${back_btn()}
    <div class="status ok" style="margin-bottom:14px">
      <div class="status-h">✓ Shipment ${done_count} of ${S.n_shipments} complete</div>
      <div class="status-b">All pouches for this shipment have been scanned.</div>
    </div>
    <div class="card">
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">Ready for shipment ${next_n}?</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:16px">You have <strong>${remaining} shipment box${remaining>1?'es':''}</strong> remaining to scan.</div>
      <div class="brow">
        <button class="btn btn-p btn-big" onclick="scr_scan_box()">📦 &nbsp;Scan Shipment ${next_n}</button>
      </div>
    </div>
  </div>`);
}

        <div class="status-b">Ready to proceed to questionnaire digitisation.</div>

      ${sections}

      <div class="status info" style="margin:16px 0">

        <div class="status-b">For each donor pouch (across all shipments), scan the form QR, photograph or upload the completed paper form, verify the AI-extracted data, and save the record.</div>

      <div class="brow">

      </div>

function scr_q_scan_qr(){

    icon:'📋', color:'info', step:`Phase 2 · Form ${S.q_idx+1} of ${total} · Shipment ${entry.shipment_idx+1}`,
    title:`Scan Form QR — ${p.id}`,
    desc:`Remove the paper questionnaire from pouch <strong>${p.id}</strong> (shipment ${entry.shipment.id}). Scan the QR code printed in the top-right corner of the form.`,

      `The form QR must match <strong>${p.id}</strong>`,

    <div class="status info" id="q-qr-st">

  S.screen='capture'; S.q_image=null; S.q_extracted={};
  sidebar({
    icon:'📸', color:'info', step:`Phase 2 · ${pouch_at_q_idx()?.pouch?.id || ''}`,

      'Supported: <strong>JPEG, PNG, PDF</strong>',
      'Lay the form flat on a well-lit surface',
      'All four corners and all fields visible',

// Detect actual MIME type from a data URL (e.g. "data:image/png;base64,...") 
function detect_mime(data_url){
  if(!data_url) return 'image/jpeg';
  const m = data_url.match(/^data:([^;]+);/);
  return m ? m[1] : 'image/jpeg';
}

// ═══════════════════════════════════════════════════════
// IMAGE RESIZER — keep under 5MB for all AI providers
// ═══════════════════════════════════════════════════════
async function resize_for_api(data_url, max_bytes=4500000, max_dim=2000){
  // Skip PDFs — Gemini handles PDFs, Claude does via document type; no resize needed
  if(data_url.startsWith('data:application/pdf')) return data_url;
  // Check current size: base64 adds ~33% overhead
  const b64 = data_url.split(',')[1] || '';
  const current_bytes = Math.ceil(b64.length * 0.75);
  if(current_bytes <= max_bytes) return data_url;

  // Load into image element
  const img = await new Promise((resolve, reject)=>{
    const i = new Image();
    i.onload = ()=>resolve(i);
    i.onerror = reject;
    i.src = data_url;
  });

  // Scale down
  let w = img.naturalWidth, h = img.naturalHeight;
  if(w > max_dim || h > max_dim){
    const ratio = Math.min(max_dim/w, max_dim/h);
    w = Math.round(w * ratio);
    h = Math.round(h * ratio);
  }
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);
  ctx.drawImage(img, 0, 0, w, h);

  // Try successively lower JPEG quality
  for(const q of [0.85, 0.75, 0.65, 0.55, 0.45, 0.35]){
    const out = canvas.toDataURL('image/jpeg', q);
    const out_bytes = Math.ceil((out.split(',')[1]||'').length * 0.75);
    if(out_bytes <= max_bytes){
      console.log(`Resized image: ${(current_bytes/1024/1024).toFixed(1)}MB → ${(out_bytes/1024/1024).toFixed(1)}MB @ q=${q} ${w}x${h}`);
      return out;
    }
  }
  // Last resort — shrink further
  const small_canvas = document.createElement('canvas');
  const ratio = 1200 / Math.max(w, h);
  small_canvas.width = Math.round(w * ratio);
  small_canvas.height = Math.round(h * ratio);
  const sctx = small_canvas.getContext('2d');
  sctx.fillStyle = '#fff';
  sctx.fillRect(0, 0, small_canvas.width, small_canvas.height);
  sctx.drawImage(img, 0, 0, small_canvas.width, small_canvas.height);
  return small_canvas.toDataURL('image/jpeg', 0.7);
}


// ═══════════════════════════════════════════════════════════════
// AUTO-CROP SIGNATURES using AI-returned bounding boxes
// Gemini returns [y_min, x_min, y_max, x_max] normalized to 0-1000
// Claude returns {x_pct, y_pct, w_pct, h_pct} as percentages 0-100
// ═══════════════════════════════════════════════════════════════
async function auto_crop_signatures_gemini(extracted, source_image_data_url){
  if(!extracted || !extracted.signature_boxes) return {};
  if(!source_image_data_url || source_image_data_url.startsWith('data:application/pdf')) return {};

  // Step 1: Crop each signature from the ORIGINAL orientation
  // Step 2: Rotate each CROPPED signature by the reported rotation angle
  // This avoids rotating the full image (expensive) and gives upright signatures
  const rotate_deg = Number(extracted.rotation_needed_degrees || 0);
  const results = {};

  for(const key of ['donor', 'coordinator']){
    const box = extracted.signature_boxes[key];
    if(!box || !Array.isArray(box) || box.length !== 4) continue;
    try{
      const img = await load_img(source_image_data_url);
      // Gemini box: [y_min, x_min, y_max, x_max] in 0-1000
      const y_min = (box[0]/1000) * img.naturalHeight;
      const x_min = (box[1]/1000) * img.naturalWidth;
      const y_max = (box[2]/1000) * img.naturalHeight;
      const x_max = (box[3]/1000) * img.naturalWidth;
      const w = x_max - x_min, h = y_max - y_min;
      if(w <= 0 || h <= 0) continue;
      // Crop raw region
      const rawCanvas = document.createElement('canvas');
      rawCanvas.width = Math.round(w);
      rawCanvas.height = Math.round(h);
      const rctx = rawCanvas.getContext('2d');
      rctx.fillStyle = '#ffffff';
      rctx.fillRect(0, 0, rawCanvas.width, rawCanvas.height);
      rctx.drawImage(img, x_min, y_min, w, h, 0, 0, rawCanvas.width, rawCanvas.height);
      // Apply rotation to make the signature upright
      const upright = rotate_canvas(rawCanvas, rotate_deg);
      // Post-process: trim whitespace around content
      const trimmed = await trim_canvas_whitespace(upright);
      results[key] = trimmed;
    }catch(e){
      console.warn('Crop failed for', key, e);
    }
  }
  return results;
}

async function auto_crop_signatures_claude(extracted, source_image_data_url){
  if(!extracted || !extracted.signature_boxes) return {};
  if(!source_image_data_url || source_image_data_url.startsWith('data:application/pdf')) return {};
  const rotate_deg = Number(extracted.rotation_needed_degrees || 0);
  const results = {};
  for(const key of ['donor', 'coordinator']){
    const box = extracted.signature_boxes[key];
    if(!box || typeof box.x_pct !== 'number') continue;
    try{
      const img = await load_img(source_image_data_url);
      const x = (box.x_pct/100) * img.naturalWidth;
      const y = (box.y_pct/100) * img.naturalHeight;
      const w = (box.w_pct/100) * img.naturalWidth;
      const h = (box.h_pct/100) * img.naturalHeight;
      if(w <= 0 || h <= 0) continue;
      const rawCanvas = document.createElement('canvas');
      rawCanvas.width = Math.round(w);
      rawCanvas.height = Math.round(h);
      const rctx = rawCanvas.getContext('2d');
      rctx.fillStyle = '#ffffff';
      rctx.fillRect(0, 0, rawCanvas.width, rawCanvas.height);
      rctx.drawImage(img, x, y, w, h, 0, 0, rawCanvas.width, rawCanvas.height);
      const upright = rotate_canvas(rawCanvas, rotate_deg);
      const trimmed = await trim_canvas_whitespace(upright);
      results[key] = trimmed;
    }catch(e){
      console.warn('Crop failed for', key, e);
    }
  }
  return results;
}

// Rotate a canvas by 0/90/180/270 degrees clockwise, return a NEW canvas
function rotate_canvas(canvas, degrees){
  const d = ((degrees % 360) + 360) % 360;
  if(d === 0) return canvas;
  const out = document.createElement('canvas');
  const w = canvas.width, h = canvas.height;
  if(d === 90 || d === 270){ out.width = h; out.height = w; }
  else { out.width = w; out.height = h; }
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, out.width, out.height);
  ctx.save();
  if(d === 90){      ctx.translate(h, 0);  ctx.rotate(Math.PI/2); }
  else if(d === 180){ ctx.translate(w, h); ctx.rotate(Math.PI); }
  else if(d === 270){ ctx.translate(0, w); ctx.rotate(3*Math.PI/2); }
  ctx.drawImage(canvas, 0, 0);
  ctx.restore();
  return out;
}

// Trim whitespace around a canvas and return data URL (tight crop)
async function trim_canvas_whitespace(canvas){
  const ctx = canvas.getContext('2d');
  const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
  const threshold = 210;
  for(let y = 0; y < canvas.height; y++){
    for(let x = 0; x < canvas.width; x++){
      const i = (y * canvas.width + x) * 4;
      const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
      if(brightness < threshold){
        if(x < minX) minX = x; if(x > maxX) maxX = x;
        if(y < minY) minY = y; if(y > maxY) maxY = y;
      }
    }
  }
  if(maxX <= minX || maxY <= minY) return canvas.toDataURL('image/png');
  const pad = 10;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(canvas.width, maxX + pad);
  maxY = Math.min(canvas.height, maxY + pad);
  const w = maxX - minX, h = maxY - minY;
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const octx = out.getContext('2d');
  octx.fillStyle = '#ffffff';
  octx.fillRect(0, 0, w, h);
  octx.drawImage(canvas, minX, minY, w, h, 0, 0, w, h);
  return out.toDataURL('image/png');
}


function load_img(data_url){
  return new Promise((res, rej)=>{
    const i = new Image();
    i.onload = ()=>res(i);
    i.onerror = rej;
    i.src = data_url;
  });
}

// After signatures are cropped, pre-fill them so the review screen shows them
function preload_sigs_into_state(sigs){
  // Store temporarily so scr_review_form can pick them up after init_sig runs
  S._pending_sigs = sigs;
}

  // Gemini accepts up to 20MB but 4MB is plenty and faster
  const resized = await resize_for_api(S.q_image, 4500000, 2000);
  const isPDF = resized.startsWith('data:application/pdf');
  const b64 = resized.replace(/^data:[^;]+;base64,/,'');
  // Detect actual mime from the data URL (not a hardcoded value) so PNG stays PNG
  const mime = detect_mime(resized);

  const prompt = `You are extracting data from a Human Milk Donor Questionnaire form.

The form has yellow-tinted signature boxes at the bottom (Section E): one for "Donor signature" on the LEFT, one for "Research Coordinator signature" on the RIGHT. Find these two yellow boxes and report their pixel bounding boxes relative to the image (0-1000 normalized coordinates, as Gemini standard).

Carefully read every field including handwritten entries. For circle/bubble-style checkboxes, if a bubble is darkened or has any mark (X, ✓, fill) it is selected.

Return ONLY a valid JSON object with these exact keys (use empty string "" for blank/unreadable):

{

  "current_medications":"", "known_allergies":"", "diet_type":"",
  "infant_age_days":"", "infant_weight_g":"",

    "coordinator": [y_min, x_min, y_max, x_max]
  },
  "rotation_needed_degrees": 0
}

- delivery_type: "Vaginal" | "Caesarean"

Return JSON only — no markdown fences, no explanation.`;

  try{

// ─── Heuristic parser — scan OCR text for known field labels ───
function parse_ocr_to_fields(text){
  const out = {};
  // Normalise whitespace but keep line breaks
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const joined = lines.join(' ');

  // Helper: find value after a label pattern, up to the next known label or newline
  function grab(label_re, max_len=80){
    const m = joined.match(label_re);
    if(!m) return '';
    let val = m[1] || '';
    return val.trim().replace(/[|]/g,'').slice(0, max_len);
  }
  // Helper: find line containing label, return text after "label:"
  function grab_line(label_keywords){
    for(const line of lines){
      const low = line.toLowerCase();
      for(const kw of label_keywords){
        const idx = low.indexOf(kw.toLowerCase());
        if(idx >= 0){
          const after = line.slice(idx + kw.length).replace(/^[:\s]+/,'').trim();
          if(after) return after;
        }
      }
    }
    return '';
  }
  // Numeric extractor — pull first number from a string
  function numify(s){
    if(!s) return '';
    const m = s.match(/-?\d+(?:[.,]\d+)?/);
    return m ? m[0].replace(',','.') : '';
  }

  // Section A
  out.donor_age       = numify(grab_line(['Donor age','donor age (years)','age (years)']));
  out.ethnicity       = grab_line(['Ethnicity']);
  out.body_weight_kg  = numify(grab_line(['Body weight','weight (kg)']));
  out.height_cm       = numify(grab_line(['Height (cm)','Height']));
  out.current_medications = grab_line(['Current medications','Medications']);
  out.known_allergies     = grab_line(['Known allergies','Allergies']);

  // Diet type — look for explicit word near "Diet type"
  const diet_area = joined.toLowerCase();
  const diet_opts = ['Regular','Vegetarian','Vegan','Halal','Other'];
  for(const d of diet_opts){
    // crude: if the word appears with a check-like glyph nearby, claim it
    const re = new RegExp('[xX\u2713\u2714\u2717\u2718\u2611]\\s*' + d, 'i');
    if(re.test(joined)) { out.diet_type = d; break; }
  }

  // Section B
  out.infant_age_days    = numify(grab_line(['Infant age','age (days)']));
  out.infant_weight_g    = numify(grab_line(['Infant weight','weight (g)']));

  // Section C
  out.collection_date = grab_line(['Collection date']);
  out.collection_time = grab_line(['Collection time']);
  out.approx_volume_ml = numify(grab_line(['Approx. volume','Volume (mL)','volume']));
  out.no_cryovials_filled = numify(grab_line(['cryovials filled','No. cryovials']));
  out.time_chilling_started = grab_line(['Time chilling started','chilling']);
  out.last_meal_before_hrs = numify(grab_line(['Last meal','meal before']));

  // Section D
  out.observations_notes = grab_line(['Observations','Notes']);

  // Section E
  out.nurse_name = grab_line(['Nurse name','Nurse']);

  // Mark all non-empty as uncertain since Tesseract is rough on handwriting
  Object.keys(out).forEach(k=>{
    if(out[k] && k!=='_raw_ocr') out[k+'_unc'] = true;
  });

  return out;
}

async function do_anthropic_extract(){
  if(!S.api_key){skip_manual();return;}
  hide_sidebar();
  main(`<div style="max-width:420px;margin:60px auto">
    <div class="card">
      <div class="loader">
        <div class="spinner"></div>
        <div class="loader-t">AI reading the questionnaire</div>
        <div class="loader-s">Extracting handwritten fields from the captured image. This takes 5–20 seconds depending on image size.</div>
      </div>
    </div>
  </div>`);

  const resized = await resize_for_api(S.q_image, 4500000, 2000);
  const isPDF = resized.startsWith('data:application/pdf');
  const b64 = resized.replace(/^data:[^;]+;base64,/,'');
  // Detect actual mime from the data URL (not a hardcoded value) so PNG stays PNG
  const mime = detect_mime(resized);

  const content_block = isPDF
    ? {type:'document', source:{type:'base64', media_type:'application/pdf', data:b64}}
    : {type:'image', source:{type:'base64', media_type:mime, data:b64}};

  const sys = `You extract data from a Human Milk Donor Questionnaire image/PDF.
Return ONLY a valid JSON object — no markdown, no preamble, no explanation.

The form has yellow-tinted signature boxes in Section E at the bottom: "Donor signature" on the LEFT, "Research Coordinator signature" on the RIGHT. Locate them and report bounding boxes as percentages of the image (0-100).

Required keys (return empty string "" for blank/unreadable fields):
donor_age, ethnicity, body_weight_kg, height_cm, current_medications, known_allergies, diet_type,
infant_age_days, infant_weight_g, infant_sex, delivery_type, infant_on_antibiotics,
collection_date, collection_time, which_breast, expression_method, approx_volume_ml, no_cryovials_filled,
time_chilling_started, last_meal_before_hrs, donor_health_today, observations_notes, nurse_name.

Also include:
signature_boxes: {
  donor: {x_pct: number, y_pct: number, w_pct: number, h_pct: number},
  coordinator: {x_pct: number, y_pct: number, w_pct: number, h_pct: number}
}
where x_pct,y_pct are the TOP-LEFT corner as percentages of image width/height, and w_pct,h_pct are width/height percentages. Coordinates must be for the ORIGINAL image orientation as received.

Also include:
rotation_needed_degrees: number (0, 90, 180, or 270) — how many degrees to rotate the image CLOCKWISE so the form header "HUMAN MILK DONOR QUESTIONNAIRE" is at the top reading left-to-right. 0 if already upright.

Rules:
- Checkboxes → return the selected option text as a string
- diet_type options: Regular, Vegetarian, Vegan, Halal, Other
- infant_sex: Male or Female
- delivery_type: Vaginal or Caesarean
- infant_on_antibiotics: Yes or No
- which_breast: Left, Right, or Both (mixed)
- expression_method: Manual, Electric pump, or Hospital pump
- donor_health_today: Healthy, Mild cold, Fever, or Other
- If a field is uncertain, add a companion key "<field>_unc":true
- Keep dates exactly as written
- If you cannot locate a signature box, omit that key from signature_boxes`;

  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.api_key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        system:sys,
        messages:[{role:'user',content:[content_block,
          {type:'text',text:'Extract all filled fields from this questionnaire and return as JSON only.'}]}]
      })
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const raw = data.content.filter(c=>c.type==='text').map(c=>c.text).join('');
    S.q_extracted = JSON.parse(raw.replace(/```json|```/g,'').trim());
    // Auto-crop signatures using Claude's bounding boxes
    try{
      const sigs = await auto_crop_signatures_claude(S.q_extracted, S.q_image);
      preload_sigs_into_state(sigs);
    }catch(e){ console.warn('Sig auto-crop error:',e); }
    scr_review_form();
  }catch(e){
    main(`<div style="max-width:520px;margin:40px auto">
      ${back_btn('Back')}
      <div class="status err">
        <div class="status-h">✗ AI extraction failed</div>
        <div class="status-b" style="margin-top:8px">
          <strong>Error:</strong> ${esc(e.message)}<br><br>
          <strong>Common causes:</strong><br>
          • Invalid or expired API key<br>
          • No credits remaining on your Anthropic account<br>
          • Network / firewall blocking api.anthropic.com<br>
          • CORS policy (check browser console)
        </div>
      </div>
      <div class="brow">
        <button class="btn btn-s" onclick="do_anthropic_extract()">Retry</button>
        <button class="btn btn-p" onclick="skip_manual()">Use manual entry instead</button>
      </div>
    </div>`);
  }
}

// Cross-check scanned cryovial count vs "No. cryovials filled" on the form
function update_vial_check(){
  const p = pouch_at_q_idx()?.pouch;
  if(!p) return;
  const scanned = (p.cryovials || []).length;
  const vf = document.getElementById('f-no_cryovials_filled');
  const note = document.getElementById('vial-check-note');
  if(!vf || !note) return;
  const raw = String(vf.value || '').trim();
  if(!raw){
    note.style.display = 'none';
    vf.style.borderColor = '';
    vf.style.background = '';
    return;
  }
  const reported = parseInt(raw, 10);
  if(isNaN(reported)){
    note.style.display = 'none';
    return;
  }
  note.style.display = 'block';
  if(reported === scanned){
    note.style.background = 'var(--success-l)';
    note.style.color = 'var(--success-d, #2a5c2a)';
    note.style.border = '1px solid #bedbbe';
    note.innerHTML = `✓ <strong>Vial count matches:</strong> ${scanned} scanned = ${reported} reported.`;
    vf.style.borderColor = '#8ebc5e';
    vf.style.background = 'var(--accent-l)';
  } else {
    const diff = reported - scanned;
    note.style.background = 'var(--danger-l)';
    note.style.color = '#7d2c2c';
    note.style.border = '1px solid #f2b8b8';
    note.innerHTML = `⚠ <strong>Mismatch:</strong> ${scanned} cryovial(s) scanned by QR but form reports <strong>${reported}</strong> filled (difference: ${diff > 0 ? '+' : ''}${diff}). Check physically or correct the form before saving.`;
    vf.style.borderColor = '#dc6060';
    vf.style.background = 'var(--danger-l)';
  }
}

}

// ── SIGNATURE PAD ──────────────────────────────────────
function init_sig(who){
  const c=document.getElementById('sig-'+who); if(!c)return;
  const wrap=c.parentElement;
  c.width=wrap.offsetWidth||320; c.height=110;
  const ctx=c.getContext('2d');
  ctx.strokeStyle='#1a2a5a'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  let drawing=false, lx=0, ly=0;
  function pos(e){
    const r=c.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {x:(src.clientX-r.left)*(c.width/r.width), y:(src.clientY-r.top)*(c.height/r.height)};
  }
  c.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);lx=p.x;ly=p.y;});
  c.addEventListener('mousemove',e=>{if(!drawing)return;const p=pos(e);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;});
  c.addEventListener('mouseup',()=>drawing=false);
  c.addEventListener('mouseleave',()=>drawing=false);
  c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;},{passive:false});
  c.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=pos(e);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  c.addEventListener('touchend',()=>drawing=false);
}
function clear_sig(who){
  const c=document.getElementById('sig-'+who); if(!c)return;
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  c.style.display='block';
  const prev=document.getElementById('sig-'+who+'-prev');
  if(prev){prev.style.display='none';prev.src='';}
}
function upload_sig(e,who){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const c=document.getElementById('sig-'+who);
    const prev=document.getElementById('sig-'+who+'-prev');
    if(c) c.style.display='none';
    if(prev){prev.src=ev.target.result;prev.style.display='block';}
  };
  reader.readAsDataURL(file);
}
function get_sig(who){
  const prev=document.getElementById('sig-'+who+'-prev');
  if(prev && prev.style.display!=='none' && prev.src) return prev.src;
  const c=document.getElementById('sig-'+who); if(!c)return null;
  const ctx=c.getContext('2d');
  const data=ctx.getImageData(0,0,c.width,c.height).data;
  for(let i=3;i<data.length;i+=4){if(data[i]>0) return c.toDataURL('image/png');}
  return null;
}

// ── COLLECT + SAVE ─────────────────────────────────────
function collect_form(){
  const keys=['donor_age','ethnicity','body_weight_kg','height_cm','current_medications','known_allergies','diet_type',
    'infant_age_days','infant_weight_g','infant_sex','delivery_type','infant_on_antibiotics',
    'collection_date','collection_time','which_breast','expression_method','approx_volume_ml','no_cryovials_filled',
    'time_chilling_started','last_meal_before_hrs','donor_health_today','observations_notes','nurse_name'];
  const out={};
  keys.forEach(k=>{const el=document.getElementById('f-'+k);if(el)out[k]=el.value;});
  return out;
}
function save_form(){
  const p=pouch_at_q_idx()?.pouch || {};
  const data=collect_form();
  if(!data.collection_date && !confirm('Collection date is empty. Save anyway?')) return;

  // ── Cross-check: scanned cryovial count vs No. cryovials filled field ──
  const scanned_n = (p.cryovials || []).length;
  const filled_n_raw = String(data.no_cryovials_filled || '').trim();
  const filled_n = filled_n_raw ? parseInt(filled_n_raw, 10) : null;
  let vial_mismatch = null;
  if(filled_n !== null && !isNaN(filled_n) && filled_n !== scanned_n){
    vial_mismatch = {
      scanned: scanned_n,
      reported: filled_n,
      diff: filled_n - scanned_n,
    };
    const msg = `⚠ VIAL COUNT MISMATCH for ${p.id}:\n\n` +
                `Scanned QR codes:     ${scanned_n}\n` +
                `Form says filled:     ${filled_n}\n` +
                `Difference:           ${filled_n - scanned_n > 0 ? '+' : ''}${filled_n - scanned_n}\n\n` +
                `This will be flagged in the session report. Save anyway?`;
    if(!confirm(msg)) return;
  }

  const entry_for_form = pouch_at_q_idx();
  const form_shipment_id = entry_for_form?.shipment?.id || '';
  S.q_forms.push({
    pouch_id:p.id, donor_ref:p.donor_ref, shipment_id:form_shipment_id,
    cryovials:p.cryovials.map(v=>v.id), form_data:data,
    sig_donor:get_sig('donor'), sig_nurse:get_sig('nurse'),
    form_image:S.q_image,  // embed the captured form photo/PDF in the record
    has_image:!!S.q_image, ai_extracted:Object.keys(S.q_extracted||{}).length>0,

    vial_count_reported: (filled_n !== null && !isNaN(filled_n)) ? filled_n : null,
    vial_count_mismatch: vial_mismatch,
  });
  S.q_idx++;
  if(S.q_idx < total_pouches()) scr_q_scan_qr();
  else scr_complete();
}

                       options:['Healthy','Mild cold','Fever','Other']},

  nurse_name:         {label:'Research Coordinator name', unit:null, type:'string'},
};

// Wrap flat form_data with units: {key: {value, label, unit}}
function with_units(form_data){
  const out = {};
  Object.keys(FIELD_META).forEach(k=>{
    const meta = FIELD_META[k];
    out[k] = {
      value: form_data[k] || '',
      label: meta.label,
      unit: meta.unit,
      type: meta.type,
    };
  });
  return out;
}

function build_session(embed_images){
  // embed_images=true → include base64 data; false → just marker
  const sig_value = (s) => embed_images ? (s || null) : (s ? '[embedded_png]' : null);
  const img_value = (im) => embed_images ? (im || null) : (im ? '[embedded_image]' : null);

  return {
    session_id: S.session_id,
    operator: S.operator,
    n_shipments_expected: S.n_shipments,
    n_donors_max_per_shipment: S.n_donors,

// Convert data URL to binary for JSZip
function data_url_to_bytes(data_url){
  const b64 = data_url.split(',')[1] || '';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function data_url_ext(data_url){
  if(data_url.startsWith('data:image/png')) return 'png';
  if(data_url.startsWith('data:image/jpeg')||data_url.startsWith('data:image/jpg')) return 'jpg';
  if(data_url.startsWith('data:application/pdf')) return 'pdf';
  return 'bin';
}

async function download_bundle(){
  if(typeof JSZip === 'undefined'){
    alert('ZIP library not loaded. Please reload the page.');
    return;
  }
  const btn = event.target;
  const orig = btn.innerHTML;
  btn.innerHTML = '⏳ Preparing bundle...';
  btn.disabled = true;

  try{
    const zip = new JSZip();
    const session_folder = `session_${S.session_id}`;
    const root = zip.folder(session_folder);

    // 1. Metadata JSON (with file path references to images)
    const metadata = build_session(false);  // no base64 bloat — separate image files
    // Replace '[embedded_png]' markers with actual relative file paths
    metadata.questionnaires.forEach(q => {
      if(q.sig_donor) q.sig_donor = `images/${q.pouch_id}_donor_signature.png`;
      if(q.sig_nurse) q.sig_nurse = `images/${q.pouch_id}_coordinator_signature.png`;
      if(q.form_image) q.form_image = `images/${q.pouch_id}_questionnaire.${data_url_ext(S.q_forms.find(f=>f.pouch_id===q.pouch_id)?.form_image||'')}`;
    });
    root.file('session_metadata.json', JSON.stringify(metadata, null, 2));

    // 2. CSV
    root.file('session_data.csv', csv_text());

    // 3. README to explain the bundle
    const readme = `Neotrient Sample Reception — Session Bundle
=============================================

Session ID: ${S.session_id}
Operator:   ${S.operator}
Shipment:   ${S.shipment?.id || '—'}
Donors:     ${S.pouches.length}
Started:    ${S.session_start}
Completed:  ${ts()}

Contents:
  session_metadata.json   Structured JSON with units + field types.
                          Image fields reference relative paths under images/
  session_data.csv        Flat spreadsheet view (opens in Excel / Numbers)
  images/                 Signatures (PNG) and form photos (JPG or PDF)
                          for each pouch:
                            {DP-xxxx}_donor_signature.png
                            {DP-xxxx}_coordinator_signature.png
                            {DP-xxxx}_questionnaire.{jpg|pdf}

Full chain-of-custody traceability:
  Analytical result → Storage vial → Collection vial → Pouch → Shipment
                                                      ${S.shipment?.id || '—'} → ${S.session_id}
`;
    root.file('README.txt', readme);

    // 4. Images folder
    const imgs = root.folder('images');
    let imageCount = 0;
    S.q_forms.forEach(f => {
      const pid = f.pouch_id;
      if(f.sig_donor){
        imgs.file(`${pid}_donor_signature.png`, data_url_to_bytes(f.sig_donor));
        imageCount++;
      }
      if(f.sig_nurse){
        imgs.file(`${pid}_coordinator_signature.png`, data_url_to_bytes(f.sig_nurse));
        imageCount++;
      }
      if(f.form_image){
        const ext = data_url_ext(f.form_image);
        imgs.file(`${pid}_questionnaire.${ext}`, data_url_to_bytes(f.form_image));
        imageCount++;
      }
    });

    // Generate ZIP
    const blob = await zip.generateAsync({
      type: 'blob',
      compression: 'DEFLATE',
      compressionOptions: { level: 6 },
    });

    // Download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${session_folder}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);

    btn.innerHTML = `✓ Downloaded (${imageCount} image${imageCount!==1?'s':''})`;
    setTimeout(()=>{
      btn.innerHTML = orig;
      btn.disabled = false;
    }, 2500);
  }catch(e){
    console.error('Bundle error:', e);
    alert('Failed to build bundle: ' + e.message);
    btn.innerHTML = orig;
    btn.disabled = false;
  }
}

// Auto-trim whitespace around signature (make the crop tight)
async function trim_whitespace(data_url){
  try{
    const img = await new Promise((res,rej)=>{
      const i = new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=data_url;
    });
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    // Find bounding box of non-white/non-light pixels
    let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
    const threshold = 200; // anything darker than this counts as content
    for(let y = 0; y < canvas.height; y++){
      for(let x = 0; x < canvas.width; x++){
        const i = (y * canvas.width + x) * 4;
        const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
        const brightness = (r + g + b) / 3;
        if(brightness < threshold){
          if(x < minX) minX = x;
          if(x > maxX) maxX = x;
          if(y < minY) minY = y;
          if(y > maxY) maxY = y;
        }
      }
    }
    if(maxX <= minX || maxY <= minY) return data_url; // no content found → return as-is

    // Pad by 8 pixels
    const pad = 8;
    minX = Math.max(0, minX - pad);
    minY = Math.max(0, minY - pad);
    maxX = Math.min(canvas.width, maxX + pad);
    maxY = Math.min(canvas.height, maxY + pad);
    const w = maxX - minX, h = maxY - minY;

    const out = document.createElement('canvas');
    out.width = w; out.height = h;
    const octx = out.getContext('2d');
    octx.fillStyle = '#ffffff';
    octx.fillRect(0, 0, w, h);
    octx.drawImage(canvas, minX, minY, w, h, 0, 0, w, h);

    return out.toDataURL('image/png');
  }catch(e){
    console.warn('Auto-crop failed:', e);
    return data_url;
  }
}
